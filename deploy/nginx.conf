server {
    listen 80;
    server_name _;

    # ─── Gzip Compression ────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        image/svg+xml;

    # ─── Static Frontend Assets ──────────────────────────────────────
    # Serve built React app directly from NGINX (faster than Node)
    location / {
        root /home/ec2-user/app/meshwork-studio/dist/public;
        try_files $uri $uri/ @node;
    }

    # Never cache index.html (SPA entry point — must always be fresh)
    location = /index.html {
        root /home/ec2-user/app/meshwork-studio/dist/public;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Long-cache hashed static assets (Vite adds content hashes to filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /home/ec2-user/app/meshwork-studio/dist/public;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri @node;
    }

    # ─── API Routes → Node.js ────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Request size limit (matches Express 5mb limit)
        client_max_body_size 5m;
    }

    # ─── WebSocket — Real-time Cursors ───────────────────────────────
    location /ws {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeout — keep alive for presence
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── Health Check (no auth, fast) ────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:5000;
        access_log off;
    }

    location /ready {
        proxy_pass http://127.0.0.1:5000;
        access_log off;
    }

    # ─── SPA Fallback → Node.js ──────────────────────────────────────
    # Any route not matching a static file falls through to the Node app
    # (handles SPA client-side routing + auth redirects)
    location @node {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}