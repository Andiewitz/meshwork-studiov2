name: Setup Node.js Project
description: Checkout, setup Node.js with caching, and install dependencies

inputs:
  node-version:
    description: Node.js version
    required: false
    default: "20"

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: "npm"
    - run: npm ci
      shell: bash
