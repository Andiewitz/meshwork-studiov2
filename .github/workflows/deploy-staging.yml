name: Deploy to Staging

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  deploy:
    name: Deploy Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Link Railway Project
        run: npx railway link --project ${{ secrets.RAILWAY_PROJECT_ID }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}
      - name: Deploy to Railway (Staging)
        run: npx railway up --ci --service meshwork-studio-staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}

      - name: Health Check
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging.meshwork.studio/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Staging deployment healthy!"
              exit 0
            fi
            echo "Attempt $i/12 — status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "FAIL: Staging health check did not pass"
          exit 1

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.25
        with:
          payload: |
            {
              "text": "Staging deploy ${{ job.status }} for ${{ github.repository }}@${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
