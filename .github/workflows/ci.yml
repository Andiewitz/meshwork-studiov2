name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch — only the latest push matters
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Type checking (fast, runs in parallel with tests) ────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Type Check
        run: npm run check

  # ── Job 2: Tests (unit + integration) ───────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      # Fake secrets — only used to satisfy module imports in test environment.
      # All DB calls and auth are mocked in tests; these values are never sent anywhere.
      DATABASE_URL: postgresql://user:password@localhost:5432/test_db
      AUTH_DATABASE_URL: postgresql://user:password@localhost:5432/test_auth_db
      SESSION_SECRET: ci-test-session-secret-not-used-in-prod
      ENCRYPTION_KEY: ci-test-encryption-key-32-bytes00000
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test:run

  # ── Job 3: Build (validates the production bundle compiles) ─────────────────
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [typecheck, test]   # Only build if both checks pass
    env:
      NODE_ENV: production
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

  # ── Job 4: Deploy to Railway (main branch only) ─────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build                         # Only deploy after a clean build
    if: github.ref == 'refs/heads/main'  # Never deploy from PRs
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_NAME }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
