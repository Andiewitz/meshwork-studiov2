name: Deploy to Production (AWS EC2)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: false
        default: "Manual trigger"

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: "22"

jobs:
  deploy:
    name: Deploy Code and Setup Nginx
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            cd /home/ec2-user/app/meshwork-studio
            ./deploy/deploy.sh

      - name: Production Health Check
        run: |
          # Use raw IP or custom domain if configured in host secret
          HOST="${{ secrets.EC2_HOST }}"
          echo "Verifying health endpoint at http://$HOST/health..."
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://$HOST/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Production server is healthy!"
              exit 0
            fi
            echo "Attempt $i/15 — status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "FAIL: Production server health check failed"
          exit 1

      - name: Install dependencies for smoke tests
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Smoke Tests
        run: npx playwright test tests/e2e/ --grep "@smoke"
        env:
          BASE_URL: http://${{ secrets.EC2_HOST }}
        continue-on-error: true

  notify:
    name: Send Slack Notification
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.25
        with:
          payload: |
            {
              "text": "AWS EC2 Production deploy result: ${{ needs.deploy.result }} for ${{ github.repository }}@${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
