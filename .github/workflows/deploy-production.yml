name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: false
        default: "Manual trigger"

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: "22"

jobs:
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Railway (Production)
        run: npx railway up --service meshwork-studio-production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PROD_TOKEN }}

      - name: Backend Health Check
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.meshwork.studio/health || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Backend healthy!"
              exit 0
            fi
            echo "Attempt $i/12 — status $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "FAIL: Backend health check did not pass"
          exit 1

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: [deploy-backend]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Vercel
        run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes

      - name: Frontend Health Check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://meshwork.studio)
          if [ "$STATUS" = "200" ]; then
            echo "Frontend healthy!"
          else
            echo "WARNING: Frontend returned status $STATUS"
          fi

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-frontend]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run smoke tests against production
        run: npx playwright test tests/e2e/ --grep "@smoke"
        env:
          BASE_URL: https://meshwork.studio
        continue-on-error: true

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend, smoke-tests]
    if: always()
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.25
        with:
          payload: |
            {
              "text": "Production deploy ${{ needs.deploy-backend.result }} / ${{ needs.deploy-frontend.result }} for ${{ github.repository }}@${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
